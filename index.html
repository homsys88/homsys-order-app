<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기온수기 발주계산</title>
<!-- 홈시스 발주관리 PWA 설정 -->
<meta name="theme-color" content="#162032">
<meta name="application-name" content="홈시스 발주">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="홈시스 발주">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="authGate" class="auth-gate">
  <div class="auth-card">
    <h1>전기온수기 발주관리</h1>
    <p>허용된 직원 계정으로 로그인하세요.</p>
    <form id="loginForm" onsubmit="loginWithEmail(event)">
      <label>이메일<input id="loginEmail" type="email" autocomplete="username" required></label>
      <label>비밀번호<input id="loginPassword" type="password" autocomplete="current-password" required></label>
      <button id="loginBtn" type="submit" class="btn accent">로그인</button>
      <div id="loginMessage" class="auth-message"></div>
    </form>
  </div>
</div>
<div id="appShell" class="app-shell" hidden>
<header class="app-header">
  <div class="brand-row">
    <h1>전기온수기 발주계산</h1>
    <span class="tag">부가세 별도 기준 · v12.0 솔라피 보안연동</span>
  </div>
  <div class="header-actions"><span id="loginUser" class="login-user"></span><button class="logout-btn" onclick="logoutApp()">로그아웃</button></div>
  <nav class="tabs" id="tabNav"></nav>
</header>
<main id="app"></main>
<div id="modalRoot"></div>
</div>

<script src="app.js"></script>
<script src="storage.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      await navigator.serviceWorker.register('sw.js', { scope: './' });
      console.log('홈시스 PWA 등록 완료');
    } catch (error) {
      console.error('홈시스 PWA 등록 실패:', error);
    }
  });
}
</script>
</body>
</html>
